<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}سایت من{% endblock %}</title>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}">خانه</a>

        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">پروفایل</a>
            <a href="{% url 'my_team' %}">
                تیم من
            </a>
            <!-- <a href="{% url 'logout' %}">خروج</a> -->
             <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" style="border:none; background:none; color:blue; cursor:pointer;">
                    خروج
                </button>
            </form>

        {% else %}
            <a href="{% url 'login' %}">ورود</a>
            <a href="{% url 'register' %}">ثبت‌نام</a>
        {% endif %}
    </nav>

    <hr>

    {% block content %}{% endblock %}
</body>
</html>
